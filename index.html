    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script>
      // Clear old zenius-auth key if exists (migration)
      try {
        if (localStorage.getItem('zenius-auth')) {
          localStorage.removeItem('zenius-auth');
        }
        if (localStorage.getItem('zenius-cart')) {
          localStorage.removeItem('zenius-cart');  
        }
      } catch(e) {}
    </script>
    <!-- PWA iOS Native Feel -->
