name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    # Hanya jalankan action ini jika ada perubahan di dalam folder migrations
    paths:
      - 'supabase/migrations/**'
  
  # Tombol manual
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: "lgbfrkenyxnrzycggjov"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push Database Migrations
        run: supabase db push --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${PROJECT_ID}.supabase.co:5432/postgres"
